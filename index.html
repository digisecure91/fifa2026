let view="today",selGroup=null,selTeam=null,searchVal="";

function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(ds){return new Date(ds+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}
function byDate(list){const m={};for(const x of list){if(!m[x.date])m[x.date]=[];m[x.date].push(x);}return m;}
function teamGroup(n){return Object.entries(GROUPS).find(([,v])=>v.includes(n))?.[0]||"?";}

function cardHTML(m,hi=false){
  const sc=SC[m.stage]||"#2a9d8f",isG=m.stage==="Group";
  const fl=isG?"26px":"20px",mb=isG?"3px":"0";
  return `<div class="card${hi?" hi":""}">
    <div class="card-top">
      <span class="stage-badge" style="background:${sc}22;color:${sc}">${isG?"GROUP "+m.group:m.stage.toUpperCase()}</span>
      <span class="card-time">${m.time} <span>CDT</span></span>
    </div>
    <div class="teams-row">
      <div class="team"><div class="team-flag" style="font-size:${fl};margin-bottom:${mb}">${FLAGS[m.home]||"⚽"}</div><div class="team-name">${m.home}</div></div>
      <div class="vs">vs</div>
      <div class="team"><div class="team-flag" style="font-size:${fl};margin-bottom:${mb}">${FLAGS[m.away]||"⚽"}</div><div class="team-name">${m.away}</div></div>
    </div>
    <div class="venue">📍 ${m.venue}</div>
  </div>`;
}
function divHTML(d,today){const t=d===today;return `<div class="divider${t?" today":""}"><div class="divider-line"></div>${t?"🔴 TODAY":fmtDate(d)}<div class="divider-line"></div></div>`;}

function render(){
  const today=todayStr(),c=document.getElementById("content");
  if(view==="today"){
    const tm=MATCHES.filter(m=>m.date===today),up=MATCHES.filter(m=>m.date>today).slice(0,12);
    c.innerHTML=`<div class="label">Today · ${fmtDate(today)}</div>${tm.length===0?'<div class="empty">No matches today</div>':tm.map(m=>cardHTML(m,true)).join("")}<div class="label mt">Up Next</div>${up.map(m=>cardHTML(m)).join("")}`;
  } else if(view==="schedule"){
    const bd=byDate(MATCHES.filter(m=>m.date>=today));
    c.innerHTML=Object.entries(bd).map(([d,ms])=>divHTML(d,today)+ms.map(m=>cardHTML(m,d===today)).join("")).join("");
  } else if(view==="groups"&&!selGroup){
    c.innerHTML=`<div class="label">12 Groups · 48 Teams</div><div class="groups-grid">${Object.entries(GROUPS).map(([g,t])=>`<button class="group-card" data-group="${g}"><div class="group-letter">Group ${g}</div>${t.map(x=>`<div class="group-team">${FLAGS[x]||"🏳️"} ${x}</div>`).join("")}</button>`).join("")}</div>`;
    c.querySelectorAll(".group-card").forEach(b=>b.onclick=()=>{selGroup=b.dataset.group;render();});
  } else if(view==="groups"&&selGroup){
    const gm=MATCHES.filter(m=>m.group===selGroup);
    c.innerHTML=`<button class="back-btn" id="back">‹ Back · Group ${selGroup}</button><div class="grp-detail-box"><div class="label" style="margin:0 0 10px">Group ${selGroup} Teams</div>${GROUPS[selGroup].map(t=>`<div class="grp-team-row"><span class="grp-team-flag">${FLAGS[t]||"🏳️"}</span><span class="grp-team-name">${t}</span></div>`).join("")}</div><div class="label">Fixtures</div>${gm.map(m=>cardHTML(m)).join("")}`;
    document.getElementById("back").onclick=()=>{selGroup=null;render();};
  } else if(view==="teams"&&!selTeam){
    const all=Object.values(GROUPS).flat().sort(),f=searchVal?all.filter(t=>t.toLowerCase().includes(searchVal.toLowerCase())):all;
    c.innerHTML=`<input class="search" id="srch" placeholder="🔍  Search country..." value="${searchVal.replace(/"/g,'&quot;')}"/>${f.map(t=>`<button class="team-row" data-team="${t.replace(/"/g,'&quot;')}"><span class="team-row-flag">${FLAGS[t]||"🏳️"}</span><span class="team-row-name">${t}</span><span class="team-row-grp">Grp ${teamGroup(t)}</span><span class="team-row-arrow">›</span></button>`).join("")}`;
    const srch=document.getElementById("srch");
    srch.oninput=e=>{searchVal=e.target.value;render();};
    srch.focus();srch.setSelectionRange(9999,9999);
    c.querySelectorAll(".team-row").forEach(b=>b.onclick=()=>{selTeam=b.dataset.team;render();});
  } else if(view==="teams"&&selTeam){
    const tm=MATCHES.filter(m=>m.home===selTeam||m.away===selTeam);
    c.innerHTML=`<button class="back-btn" id="back">‹ Back · ${selTeam}</button><div class="team-hero"><div class="team-hero-flag">${FLAGS[selTeam]||"🏳️"}</div><div class="team-hero-name">${selTeam}</div><div class="team-hero-grp">Group ${teamGroup(selTeam)}</div></div><div class="label">All Fixtures</div>${tm.map(m=>cardHTML(m)).join("")}`;
    document.getElementById("back").onclick=()=>{selTeam=null;searchVal="";render();};
  }
}

document.querySelectorAll(".nav-btn").forEach(b=>{
  b.onclick=()=>{
    view=b.dataset.view;selGroup=null;selTeam=null;searchVal="";
    document.querySelectorAll(".nav-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");render();window.scrollTo(0,0);
  };
});
render();

// PWA install prompt
let dp;
const banner=document.getElementById("install-banner");
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dp=e;banner.classList.add("show");});
document.getElementById("install-btn").onclick=()=>{banner.classList.remove("show");if(dp){dp.prompt();dp=null;}};
document.getElementById("install-dismiss").onclick=()=>banner.classList.remove("show");
window.addEventListener("appinstalled",()=>banner.classList.remove("show"));
</script>

<script>
// Register service worker from blob so it works from a single HTML file
if("serviceWorker" in navigator){
  const sw=`const C="wc2026-v1",A=["/"];self.addEventListener("install",e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)));self.skipWaiting();});self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))));self.clients.claim();});self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  const url=URL.createObjectURL(new Blob([sw],{type:"text/javascript"}));
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>
